<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScholarAI - Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #4361EE;
            --primary-dark: #3651CC;
            --success-color: #10B981;
            --success-dark: #059669;
            --error-color: #EF4444;
            --warning-color: #F59E0B;
            --text-primary: #FFFFFF;
            --text-secondary: #E2E8F0;
            --text-muted: #94A3B8;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --shadow-soft: 0 8px 32px rgba(31, 38, 135, 0.15);
            --shadow-glow: 0 0 20px rgba(67, 97, 238, 0.3);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0F172A;
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Background with proper image handling */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(30, 41, 59, 0.9) 100%),
                radial-gradient(circle at 20% 50%, rgba(67, 97, 238, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(245, 158, 11, 0.1) 0%, transparent 50%);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Animated background elements */
        .bg-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .floating-shape {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--success-color));
            opacity: 0.1;
            animation: float 20s infinite ease-in-out;
        }

        .shape1 {
            width: 300px;
            height: 300px;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .shape2 {
            width: 200px;
            height: 200px;
            top: 60%;
            right: 10%;
            animation-delay: 5s;
        }

        .shape3 {
            width: 150px;
            height: 150px;
            bottom: 10%;
            left: 60%;
            animation-delay: 10s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-20px) rotate(120deg); }
            66% { transform: translateY(20px) rotate(240deg); }
        }

        /* Main container */
        .main-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Glassmorphism card */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--shadow-soft), var(--shadow-glow);
            width: 100%;
            max-width: 480px;
            padding: 48px;
            position: relative;
            overflow: hidden;
            animation: slideIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes slideIn {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Header */
        .card-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 24px;
            box-shadow: var(--shadow-glow);
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 400;
        }

        /* Form elements */
        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .form-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 20px rgba(67, 97, 238, 0.2);
            transform: translateY(-2px);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        /* Buttons */
        .button {
            width: 100%;
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .button-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: var(--text-primary);
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3);
        }

        .button-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(67, 97, 238, 0.4);
        }

        .button-primary:active {
            transform: translateY(0);
        }

        .button-secondary {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--glass-border);
        }

        .button-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
        }

        .button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .button:hover::before {
            left: 100%;
        }

        /* Loading state */
        .button.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .button.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 2px solid var(--text-primary);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Success message */
        .success-message {
            background: linear-gradient(135deg, var(--success-color), var(--success-dark));
            color: var(--text-primary);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 24px;
            animation: slideIn 0.5s ease-out;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .success-icon {
            font-size: 48px;
            margin-bottom: 12px;
            animation: bounceIn 0.6s ease-out;
        }

        @keyframes bounceIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Error message */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--error-color);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Links */
        .back-link {
            text-align: center;
            margin-top: 24px;
        }

        .back-link a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .back-link a:hover {
            color: var(--text-secondary);
        }

        /* Responsive design */
        @media (max-width: 640px) {
            .glass-card {
                margin: 16px;
                padding: 32px 24px;
            }
            
            .title {
                font-size: 24px;
            }
            
            .logo {
                width: 48px;
                height: 48px;
                font-size: 20px;
            }
        }

        @media (max-width: 480px) {
            .glass-card {
                padding: 24px 20px;
            }
            
            .title {
                font-size: 20px;
            }
        }

        /* Step indicator */
        .step-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 32px;
            gap: 8px;
        }

        .step {
            width: 32px;
            height: 4px;
            border-radius: 2px;
            background: var(--glass-border);
            transition: all 0.3s;
        }

        .step.active {
            background: var(--primary-color);
            box-shadow: 0 0 10px rgba(67, 97, 238, 0.3);
        }

        .step.completed {
            background: var(--success-color);
        }
    </style>
</head>
<body>
    <div class="background-container">
        <div class="bg-animation">
            <div class="floating-shape shape1"></div>
            <div class="floating-shape shape2"></div>
            <div class="floating-shape shape3"></div>
        </div>
    </div>

    <div class="main-container">
        <div class="glass-card">
            <!-- Shimmer effect on top -->
            
            <div class="card-header">
                <div class="logo">🎓</div>
                <h1 class="title">Reset Password</h1>
                <p class="subtitle">Enter your email to receive a reset code</p>
            </div>

            <!-- Step indicator -->
            <div class="step-indicator">
                <div class="step active" id="step1"></div>
                <div class="step" id="step2"></div>
            </div>

            <!-- Email form -->
            <div id="emailForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-input" 
                        placeholder="Enter your email address"
                        autocomplete="email"
                        required
                    >
                </div>

                <button type="submit" class="button button-primary" id="sendCodeBtn">
                    <span id="btnText">Send Reset Code</span>
                </button>

                <div id="errorMessage" class="error-message" style="display: none;"></div>
            </div>

            <!-- Code form (hidden initially) -->
            <div id="codeForm" style="display: none;">
                <div class="success-message" id="successMessage" style="display: none;">
                    <div class="success-icon">👍</div>
                    <h3>Reset Code Sent Successfully!</h3>
                    <p>Check your inbox at <strong id="emailDisplay"></strong></p>
                </div>

                <div class="form-group">
                    <label class="form-label" for="resetCode">Enter Reset Code</label>
                    <input 
                        type="text" 
                        id="resetCode" 
                        class="form-input" 
                        placeholder="000000"
                        maxlength="6"
                        autocomplete="one-time-code"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="newPassword">New Password</label>
                    <input 
                        type="password" 
                        id="newPassword" 
                        class="form-input" 
                        placeholder="Enter your new password"
                        autocomplete="new-password"
                        required
                    >
                </div>

                <button type="submit" class="button button-primary" id="updatePasswordBtn">
                    <span id="updateBtnText">Update Password</span>
                </button>

                <div id="updateErrorMessage" class="error-message" style="display: none;"></div>

                <div id="updateSuccessMessage" class="success-message" style="display: none;">
                    <div class="success-icon">✅</div>
                    <h3>Password Reset Complete!</h3>
                    <p>You can now log in with your new password</p>
                </div>
            </div>

            <!-- Back link -->
            <div class="back-link">
                <a href="#" id="backLink">← Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        // State management
        let currentStep = 'email';
        let userEmail = '';

        // DOM elements
        const emailForm = document.getElementById('emailForm');
        const codeForm = document.getElementById('codeForm');
        const emailInput = document.getElementById('email');
        const resetCodeInput = document.getElementById('resetCode');
        const newPasswordInput = document.getElementById('newPassword');
        const sendCodeBtn = document.getElementById('sendCodeBtn');
        const updatePasswordBtn = document.getElementById('updatePasswordBtn');
        const backLink = document.getElementById('backLink');
        const errorMessage = document.getElementById('errorMessage');
        const updateErrorMessage = document.getElementById('updateErrorMessage');
        const successMessage = document.getElementById('successMessage');
        const updateSuccessMessage = document.getElementById('updateSuccessMessage');
        const emailDisplay = document.getElementById('emailDisplay');
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');

        // Email form submission
        emailForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            
            if (!email) {
                showError('Please enter your email address');
                return;
            }

            if (!validateEmail(email)) {
                showError('Please enter a valid email address');
                return;
            }

            // Show loading state
            setLoading(sendCodeBtn, true);

            try {
                // Simulate API call (replace with actual API call)
                await simulateSendCode(email);
                
                // Transition to code form
                userEmail = email;
                showCodeForm();
                showSuccess(email);
                
            } catch (error) {
                showError('Failed to send reset code. Please try again.');
                setLoading(sendCodeBtn, false);
            }
        });

        // Code form submission
        codeForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const code = resetCodeInput.value.trim();
            const newPassword = newPasswordInput.value;
            
            if (!code || !newPassword) {
                showUpdateError('Please fill in all fields');
                return;
            }

            if (code.length !== 6) {
                showUpdateError('Reset code must be 6 digits');
                return;
            }

            if (!validatePassword(newPassword)) {
                showUpdateError('Password does not meet requirements');
                return;
            }

            // Show loading state
            setLoading(updatePasswordBtn, true);

            try {
                // Simulate API call (replace with actual API call)
                await simulateUpdatePassword(code, newPassword);
                
                // Show success
                showUpdateSuccess();
                
            } catch (error) {
                showUpdateError('Failed to update password. Please try again.');
                setLoading(updatePasswordBtn, false);
            }
        });

        // Back link
        backLink.addEventListener('click', (e) => {
            e.preventDefault();
            transitionToLogin();
        });

        // Helper functions
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function validatePassword(password) {
            // Basic validation - enhance as needed
            return password.length >= 8;
        }

        function setLoading(button, loading) {
            if (loading) {
                button.classList.add('loading');
                button.disabled = true;
            } else {
                button.classList.remove('loading');
                button.disabled = false;
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 5000);
        }

        function showUpdateError(message) {
            updateErrorMessage.textContent = message;
            updateErrorMessage.style.display = 'block';
            setTimeout(() => {
                updateErrorMessage.style.display = 'none';
            }, 5000);
        }

        function showSuccess(email) {
            emailDisplay.textContent = email;
            successMessage.style.display = 'block';
            step1.classList.add('completed');
            step2.classList.add('active');
        }

        function showUpdateSuccess() {
            updateSuccessMessage.style.display = 'block';
            codeForm.style.display = 'none';
            step2.classList.add('completed');
        }

        function showCodeForm() {
            emailForm.style.display = 'none';
            codeForm.style.display = 'block';
            currentStep = 'code';
        }

        function transitionToLogin() {
            // Smooth transition effect
            document.querySelector('.glass-card').style.animation = 'slideOut 0.5s ease-in forwards';
            
            setTimeout(() => {
                // Redirect to login page
                window.location.href = '/login';
            }, 500);
        }

        // Simulate API calls (replace with actual implementation)
        async function simulateSendCode(email) {
            // Simulate network delay
            await new Promise(resolve => setTimeout(resolve, 1500));
            
            // Simulate success (in real implementation, this would be your API call)
            console.log('Sending reset code to:', email);
        }

        async function simulateUpdatePassword(code, password) {
            // Simulate network delay
            await new Promise(resolve => setTimeout(resolve, 1500));
            
            // Simulate success (in real implementation, this would be your API call)
            console.log('Updating password with code:', code);
        }

        // Add input focus effects
        emailInput.addEventListener('focus', () => {
            emailInput.parentElement.classList.add('focused');
        });

        emailInput.addEventListener('blur', () => {
            emailInput.parentElement.classList.remove('focused');
        });

        resetCodeInput.addEventListener('focus', () => {
            resetCodeInput.parentElement.classList.add('focused');
        });

        resetCodeInput.addEventListener('blur', () => {
            resetCodeInput.parentElement.classList.remove('focused');
        });

        newPasswordInput.addEventListener('focus', () => {
            newPasswordInput.parentElement.classList.add('focused');
        });

        newPasswordInput.addEventListener('blur', () => {
            newPasswordInput.parentElement.classList.remove('focused');
        });

        // Add slide out animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideOut {
                0% { opacity: 1; transform: translateY(0) scale(1); }
                100% { opacity: 0; transform: translateY(-30px) scale(0.9); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
